{% extends "base.html" %}
{% block title %}Visitors · MST{% endblock %}
{% block content %}
<div style="padding:14px;max-width:600px;margin:0 auto">
<div class="card">
  <div class="card-head"><div class="card-title">👤 Visitor Entry</div></div>
  <label>Naam *</label><input type="text" id="v-name" placeholder="Customer naam">
  <label>Phone</label><input type="tel" id="v-phone" placeholder="Mobile">
  <div class="row2">
    <div><label>Type</label>
      <select id="v-type"><option>Walk-in</option><option>Builder</option><option>Architect</option><option>Contractor</option><option>Existing Customer</option></select>
    </div>
    <div><label>Purpose</label>
      <select id="v-purpose"><option>Browsing</option><option>Quotation</option><option>Order</option><option>Payment</option><option>Service</option></select>
    </div>
  </div>
  <button class="btn btn-green" style="margin-top:10px" onclick="checkin()">✅ Check-In</button>
</div>
<div class="card">
  <div class="card-head"><div class="card-title">📋 Aaj ke Visitors</div><span class="badge badge-green" id="v-count">0</span></div>
  <div id="v-list"><div class="empty">Loading...</div></div>
</div>
</div>
{% endblock %}
{% block extra_js %}
<script>
async function checkin(){
  const name=document.getElementById('v-name').value.trim();
  if(!name){toast('Naam zaroori hai');return;}
  await api('POST','/api/visitors',{name,phone:document.getElementById('v-phone').value.trim(),visitor_type:document.getElementById('v-type').value,purpose:document.getElementById('v-purpose').value});
  document.getElementById('v-name').value='';document.getElementById('v-phone').value='';
  toast('✅ Check-in ho gaya!');loadVisitors();
}
async function loadVisitors(){
  const d=await api('GET','/api/visitors');
  const visitors=d.visitors||[];
  document.getElementById('v-count').textContent=visitors.length;
  const el=document.getElementById('v-list');
  if(!visitors.length){el.innerHTML='<div class="empty">Koi visitor nahi aaj</div>';return;}
  el.innerHTML=visitors.map(v=>`
    <div class="list-item">
      <div class="avatar">${initials(v.name)}</div>
      <div class="li-body">
        <div class="li-name">${v.name} <span class="badge ${v.check_out?'badge-muted':'badge-green'}">${v.check_out?'Left':'Inside'}</span></div>
        <div class="li-sub">${v.phone||'—'} · ${v.purpose} · In: ${v.check_in?.split('T')[1]?.slice(0,5)||''}</div>
      </div>
      <div class="li-actions">
        ${v.phone?`<a href="tel:${v.phone}"><button class="btn btn-green btn-sm btn-icon">📞</button></a>`:''}
        ${!v.check_out?`<button class="btn btn-sm" style="background:var(--paper-dim)" onclick="checkout('${v.id}')">Out</button>`:''}
      </div>
    </div>`).join('');
}
async function checkout(id){await api('POST',`/api/visitors/${id}/checkout`,{});toast('✅ Check-out!');loadVisitors();}
loadVisitors();
</script>
{% endblock %}
