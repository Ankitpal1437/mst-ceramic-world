<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Register — MST Ceramic World</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div class="login-page">
  <div class="login-box">
    <div class="login-logo">M</div>
    <div class="login-title">Register</div>
    <div class="login-sub">MST Ceramic World — Staff Registration</div>
    <div id="msg" style="display:none;border-radius:8px;padding:10px 12px;font-size:12px;margin-bottom:12px"></div>
    <label>Full Name *</label>
    <input type="text" id="name" placeholder="Aapka naam">
    <label style="margin-top:10px">Phone Number</label>
    <input type="tel" id="phone" placeholder="Mobile number">
    <label style="margin-top:10px">Email (optional)</label>
    <input type="email" id="email" placeholder="Email address">
    <label style="margin-top:10px">Password *</label>
    <input type="password" id="password" placeholder="Password banayein">
    <button class="btn btn-dark" style="margin-top:16px" onclick="doRegister()">Register →</button>
    <div style="text-align:center;margin-top:12px">
      <a href="/login" style="color:var(--brass-deep);font-size:12px;font-weight:600">← Back to Login</a>
    </div>
  </div>
</div>
<script>
async function doRegister() {
  const name = document.getElementById('name').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value.trim();
  const msg = document.getElementById('msg');
  if (!name || !password || (!phone && !email)) {
    msg.style.cssText = 'display:block;background:#fbe9e7;color:#c0392b';
    msg.textContent = 'Naam, password aur phone ya email zaroori hai'; return;
  }
  const res = await fetch('/api/auth/register', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({name, phone, email, password})});
  const data = await res.json();
  if (data.ok) {
    msg.style.cssText = 'display:block;background:#e8f8f0;color:#27ae60';
    msg.textContent = data.message;
  } else {
    msg.style.cssText = 'display:block;background:#fbe9e7;color:#c0392b';
    msg.textContent = data.error;
  }
}
</script>
</body>
</html>
