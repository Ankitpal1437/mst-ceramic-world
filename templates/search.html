{% extends "base.html" %}
{% block title %}Search · MST{% endblock %}
{% block content %}
<div style="padding:14px;max-width:600px;margin:0 auto">
<div class="search-hero">
  <div class="search-hero-inner">
    <h2>Product Search</h2>
    <p id="stats-text">72,000+ Jaquar products</p>
    <div class="search-box">
      <input type="text" id="search-input" placeholder="Code ya naam (e.g. CHR-079N)" autocomplete="off" autofocus>
      <button onclick="clearSearch()" id="clear-btn" style="display:none;background:rgba(255,255,255,0.1);border:none;color:rgba(255,255,255,0.6);padding:8px 10px;border-radius:6px;margin-right:4px">✕</button>
    </div>
  </div>
</div>
<div id="results-area">
  <div class="empty"><div class="empty-icon">🔍</div>Search karo product dhundhne ke liye</div>
</div>
</div>

<div class="modal-bg" id="product-modal">
  <div class="modal">
    <div class="modal-head"><div class="modal-title" id="pm-code">Product</div><button class="modal-close" onclick="hideModal('product-modal')">✕</button></div>
    <div id="pm-body"></div>
  </div>
</div>
{% endblock %}
{% block extra_js %}
<script>
let searchTimer;
const input = document.getElementById('search-input');
const clearBtn = document.getElementById('clear-btn');

api('GET','/api/stats').then(d=>{
  document.getElementById('stats-text').textContent = `${d.total?.toLocaleString('en-IN')} products · ${d.fittings?.toLocaleString('en-IN')} fittings · ${d.lighting?.toLocaleString('en-IN')} lighting`;
});

input.addEventListener('input', () => {
  clearBtn.style.display = input.value ? 'block' : 'none';
  clearTimeout(searchTimer);
  if (input.value.trim().length < 2) {
    document.getElementById('results-area').innerHTML = '<div class="empty"><div class="empty-icon">🔍</div>2 characters type karo</div>';
    return;
  }
  document.getElementById('results-area').innerHTML = '<div class="empty">Searching...</div>';
  searchTimer = setTimeout(() => runSearch(input.value.trim()), 250);
});

function clearSearch() {
  input.value = ''; clearBtn.style.display = 'none';
  document.getElementById('results-area').innerHTML = '<div class="empty"><div class="empty-icon">🔍</div>Search karo</div>';
  input.focus();
}

async function runSearch(q) {
  const d = await api('GET', `/api/search?q=${encodeURIComponent(q)}`);
  const area = document.getElementById('results-area');
  if (!d.results?.length) { area.innerHTML = '<div class="empty"><div class="empty-icon">📭</div>Koi product nahi mila</div>'; return; }
  area.innerHTML = `<div style="font-size:12px;color:var(--muted);margin-bottom:10px"><b>${d.count}</b> products mile · Exact match pehle</div>
  <div class="product-grid">${d.results.map(p => productCard(p)).join('')}</div>`;
}

function productCard(p) {
  const isL = p.source === 'LIGHTING';
  let chips = '';
  if (isL) {
    if(p.ewp) chips += chip('EWP',p.ewp); if(p.mdp) chips += chip('MDP',p.mdp);
    if(p.sdp) chips += chip('SDP',p.sdp); if(p.npp) chips += chip('NPP',p.npp);
    if(p.nrp) chips += chip('NRP',p.nrp,true); if(p.mrp) chips += chip('MRP',p.mrp);
  } else {
    if(p.sdp) chips += chip('SDP',p.sdp); if(p.nrp) chips += chip('NRP',p.nrp,true);
    if(p.mrp) chips += chip('MRP',p.mrp); if(p.old_nrp) chips += chip('Old NRP',p.old_nrp);
  }
  return `<div class="product-card ${isL?'lighting':''}">
    <div class="edge"></div>
    <div class="pc-body">
      <div style="display:flex;align-items:center;justify-content:space-between">
        <span class="pc-code">${p.code}</span>
        <span class="pc-source ${isL?'badge-brass':'badge-blue'}" style="font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;background:${isL?'var(--brass-tint)':'var(--blue-tint)'};color:${isL?'var(--brass-deep)':'var(--blue)'}">${isL?'Lighting':'Fittings'}</span>
      </div>
      <div class="pc-desc">${p.description}</div>
    </div>
    <div class="spec-strip">${chips||'<span style="font-size:11px;color:var(--muted)">No pricing</span>'}</div>
    <div class="pc-actions">
      <button class="pc-btn" onclick='openProduct(${JSON.stringify(p).replace(/'/g,"&apos;")})'>Details</button>
      <button class="pc-btn primary" onclick='addToCart(${JSON.stringify(p).replace(/'/g,"&apos;")})'>+ Quote</button>
    </div>
  </div>`;
}

function chip(k,v,hl=false) {
  if(!v||v==='None'||v==='nan') return '';
  return `<div class="spec-chip ${hl?'hl':''}"><div class="k">${k}</div><div class="v">₹${v}</div></div>`;
}

function openProduct(p) {
  document.getElementById('pm-code').textContent = p.code;
  const isL = p.source==='LIGHTING';
  let prices = '';
  if(isL){['ewp','mdp','sdp','npp','nrp','mrp'].forEach(k=>{if(p[k]&&p[k]!='None') prices+=priceRow(k.toUpperCase(),p[k]);});}
  else{['sdp','nrp','mrp','old_nrp','old_mrp'].forEach(k=>{if(p[k]&&p[k]!='None') prices+=priceRow(k.replace('_',' ').toUpperCase(),p[k]);});}
  document.getElementById('pm-body').innerHTML = `
    <span class="badge ${isL?'badge-brass':'badge-blue'}" style="margin-bottom:10px;display:inline-block">${isL?'Lighting':'Fittings'}</span>
    <div style="font-size:13px;color:var(--muted);margin-bottom:14px">${p.description}</div>
    <div class="row2" style="gap:8px">${prices}</div>
    <button class="btn btn-dark" style="margin-top:14px" onclick='addToCart(${JSON.stringify(p).replace(/'/g,"&apos;")});hideModal("product-modal")'>+ Add to Quotation</button>`;
  showModal('product-modal');
}

function priceRow(k,v){return `<div style="background:var(--paper-dim);border-radius:8px;padding:8px 10px"><div style="font-size:10px;color:var(--muted);font-weight:700">${k}</div><div style="font-size:14px;font-weight:700">₹${v}</div></div>`;}

function addToCart(p) {
  let cart = JSON.parse(sessionStorage.getItem('quote_cart')||'[]');
  cart.push({...p, qty:1, imgUrl:'', tag:''});
  sessionStorage.setItem('quote_cart', JSON.stringify(cart));
  toast('✅ Added → go to Quote page');
}
</script>
{% endblock %}
