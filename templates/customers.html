{% extends "base.html" %}
{% block title %}Customers · MST{% endblock %}
{% block content %}
<div style="padding:14px;max-width:600px;margin:0 auto">
<div class="card">
  <div class="card-head"><div class="card-title">👥 Customers</div><button class="btn btn-brass btn-sm" onclick="showModal('add-cust-modal')">+ New</button></div>
  <input type="text" id="cust-search" placeholder="Search naam ya phone..." oninput="filterCustomers()" style="margin-bottom:10px">
  <div id="cust-list"><div class="empty">Loading...</div></div>
</div>
</div>

<div class="modal-bg" id="add-cust-modal">
  <div class="modal">
    <div class="modal-head"><div class="modal-title">New Customer</div><button class="modal-close" onclick="hideModal('add-cust-modal')">✕</button></div>
    <label>Naam *</label><input type="text" id="cn-name" placeholder="Customer naam">
    <label>Phone</label><input type="tel" id="cn-phone" placeholder="Mobile number">
    <label>Alt Phone</label><input type="tel" id="cn-phone2" placeholder="Optional">
    <label>Site/Project</label><input type="text" id="cn-site" placeholder="e.g. Lodha Heights B-204">
    <label>Area/Address</label><input type="text" id="cn-area" placeholder="Area ya address">
    <label>Architect</label><input type="text" id="cn-arch" placeholder="Optional">
    <div class="row2">
      <div><label>Budget</label>
        <select id="cn-budget"><option value="">Select</option><option>Under ₹25K</option><option>₹25K-50K</option><option>₹50K-1L</option><option>₹1L-2L</option><option>Above ₹2L</option></select>
      </div>
      <div><label>Bathrooms</label>
        <select id="cn-baths"><option>1</option><option>2</option><option>3</option><option>4+</option></select>
      </div>
    </div>
    <label>Referred By</label>
    <select id="cn-ref"><option>Walk-in</option><option>Contractor</option><option>Architect</option><option>Builder</option><option>Online</option><option>Existing Customer</option></select>
    <label>Assigned To</label>
    <select id="cn-assigned"><option value="">-- Select --</option></select>
    <label>Construction Stage</label>
    <select id="cn-stage"><option>Planning</option><option>Under Construction</option><option>Ready to Fit</option><option>Renovation</option></select>
    <label>Notes</label><textarea id="cn-notes" placeholder="Koi khaas baat..."></textarea>
    <button class="btn btn-dark" style="margin-top:10px" onclick="addCustomer()">✅ Save Customer</button>
  </div>
</div>
{% endblock %}
{% block extra_js %}
<script>
let allCustomers=[];
async function loadCustomers(){
  const d=await api('GET','/api/customers');
  allCustomers=d.customers||[];
  renderCustomers(allCustomers);
  const users=await api('GET','/api/users/approved');
  const sel=document.getElementById('cn-assigned');
  sel.innerHTML='<option value="">-- Select --</option>'+(users.users||[]).map(u=>`<option value="${u.id}" data-name="${u.name}">${u.name}</option>`).join('');
}

function filterCustomers(){
  const q=document.getElementById('cust-search').value.toLowerCase();
  renderCustomers(allCustomers.filter(c=>(c.name+c.phone+c.area+c.site_name).toLowerCase().includes(q)));
}

function renderCustomers(list){
  const el=document.getElementById('cust-list');
  if(!list.length){el.innerHTML='<div class="empty">Koi customer nahi</div>';return;}
  el.innerHTML=list.map(c=>`
    <div class="list-item" onclick="window.location='/customers/${c.id}'" style="cursor:pointer">
      <div class="avatar">${initials(c.name)}</div>
      <div class="li-body">
        <div class="li-name">${c.name} <span class="badge badge-muted" style="font-size:9px">${c.status||'New'}</span></div>
        <div class="li-sub">${c.phone||'—'} · ${c.area||c.site_name||'—'}</div>
        <div class="li-sub">${c.assigned_name?'👤 '+c.assigned_name:''} ${c.budget_range?'· '+c.budget_range:''}</div>
      </div>
      <span style="color:var(--muted);font-size:18px">›</span>
    </div>`).join('');
}

async function addCustomer(){
  const name=document.getElementById('cn-name').value.trim();
  if(!name){toast('Naam zaroori hai');return;}
  const sel=document.getElementById('cn-assigned');
  const assignedName=sel.options[sel.selectedIndex]?.getAttribute('data-name')||'';
  const res=await api('POST','/api/customers',{
    name, phone:document.getElementById('cn-phone').value.trim(),
    phone2:document.getElementById('cn-phone2').value.trim(),
    site_name:document.getElementById('cn-site').value.trim(),
    area:document.getElementById('cn-area').value.trim(),
    architect_name:document.getElementById('cn-arch').value.trim(),
    budget_range:document.getElementById('cn-budget').value,
    num_bathrooms:parseInt(document.getElementById('cn-baths').value)||1,
    referred_by:document.getElementById('cn-ref').value,
    assigned_to:sel.value||null, assigned_name:assignedName,
    construction_stage:document.getElementById('cn-stage').value,
    notes:document.getElementById('cn-notes').value.trim()
  });
  if(res.ok){hideModal('add-cust-modal');toast('✅ Customer saved!');loadCustomers();}
  else toast('❌ Failed: '+res.error);
}
loadCustomers();
</script>
{% endblock %}
