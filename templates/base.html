<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>{% block title %}MST Ceramic World{% endblock %}</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div class="topbar">
  <div class="topbar-brand">
    <div class="brand-m">M</div>
    <div><div class="brand-name">MST CERAMIC WORLD</div><div class="brand-sub">Jaquar Dealer · Kalyan-W</div></div>
  </div>
  <div class="topbar-user">
    <span class="user-badge">{{ user.name }}</span>
    <a href="/logout"><button class="logout-btn">Logout</button></a>
  </div>
</div>

{% block content %}{% endblock %}

<nav class="bottom-nav">
  <button class="nav-item" id="nav-home" onclick="window.location='/home'"><span class="ni">🏠</span>Home</button>
  <button class="nav-item" id="nav-search" onclick="window.location='/search'"><span class="ni">🔍</span>Search</button>
  <button class="nav-item" id="nav-quotation" onclick="window.location='/quotation'"><span class="ni">📄</span>Quote</button>
  <button class="nav-item" id="nav-customers" onclick="window.location='/customers'"><span class="ni">👥</span>Customers</button>
  <button class="nav-item" id="nav-orders" onclick="window.location='/orders'"><span class="ni">📦</span>Orders</button>
</nav>

<div class="toast" id="toast"></div>
<script src="/static/js/app.js"></script>
{% block extra_js %}{% endblock %}
<script>
const path = window.location.pathname;
const navMap = {'/home':'home','/search':'search','/quotation':'quotation','/customers':'customers','/orders':'orders','/followups':'orders','/visitors':'orders','/admin':'orders'};
const activeNav = navMap[path];
if (activeNav) { const el = document.getElementById('nav-'+activeNav); if(el) el.classList.add('active'); }
</script>
</body>
</html>
